<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>WPS Browser Test</title>
<style>
body{font:12px monospace;padding:10px;background:#fff;color:#333}
.ok{color:green} .fail{color:red} .warn{color:orange}
pre{white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<h3>WPS Browser Diagnostics</h3>
<pre id="log"></pre>
<script>
var L=document.getElementById('log');
function log(msg,cls){L.innerHTML+='<span class="'+(cls||'')+'">'+ msg+'</span>\n'}
function ok(m){log('[OK] '+m,'ok')} function fail(m){log('[FAIL] '+m,'fail')} function warn(m){log('[WARN] '+m,'warn')}
function test(name,fn){try{var r=fn();r?ok(name+': '+r):fail(name)}catch(e){fail(name+': '+e.message)}}

log('=== User Agent ===');
log(navigator.userAgent);
log('');

log('=== Core JS Features ===');
test('Promise', function(){return typeof Promise});
test('fetch', function(){return typeof fetch});
test('EventSource (SSE)', function(){return typeof EventSource});
test('Symbol', function(){return typeof Symbol});
test('Map/Set', function(){return typeof Map+'/'+typeof Set});
test('Proxy', function(){return typeof Proxy});
test('WeakRef', function(){return typeof WeakRef});
test('globalThis', function(){return typeof globalThis});
test('queueMicrotask', function(){return typeof queueMicrotask});
test('structuredClone', function(){return typeof structuredClone});
test('AbortController', function(){return typeof AbortController});
test('TextEncoder', function(){return typeof TextEncoder});
test('TextDecoder', function(){return typeof TextDecoder});
test('crypto.randomUUID', function(){return typeof crypto?.randomUUID});
test('BroadcastChannel', function(){return typeof BroadcastChannel});
test('ResizeObserver', function(){return typeof ResizeObserver});
test('IntersectionObserver', function(){return typeof IntersectionObserver});
test('MutationObserver', function(){return typeof MutationObserver});
test('URLPattern', function(){return typeof URLPattern});

log('');
log('=== ES Module / Dynamic Import ===');
test('import.meta support', function(){
    try{new Function('return import.meta.url');return 'supported'}catch(e){return false}
});

log('');
log('=== CSS Features ===');
test('CSS.supports (has)', function(){return typeof CSS?.supports === 'function' ? 'yes' : false});
test(':has selector', function(){
    try{document.querySelector(':has(body)');return 'supported'}catch(e){return false}
});

log('');
log('=== Network Test to opencode ===');
try {
    fetch('http://127.0.0.1:14097/RDpcY29kZVxvZmZpY2UtdGVzdA/global/health')
    .then(function(r){ok('fetch proxy 14097: status '+r.status)})
    .catch(function(e){fail('fetch proxy 14097: '+e.message)});
} catch(e){fail('fetch proxy: '+e.message)}

try {
    fetch('http://127.0.0.1:14096/RDpcY29kZVxvZmZpY2UtdGVzdA/global/health')
    .then(function(r){ok('fetch direct 14096: status '+r.status)})
    .catch(function(e){fail('fetch direct 14096: '+e.message)});
} catch(e){fail('fetch direct: '+e.message)}

log('');
log('=== SSE Test ===');
try {
    var es = new EventSource('http://127.0.0.1:14097/global/event');
    es.onopen=function(){ok('SSE connected');es.close()};
    es.onerror=function(){fail('SSE error, readyState='+es.readyState);es.close()};
    setTimeout(function(){if(es.readyState===0)warn('SSE still connecting after 3s');es.close()},3000);
} catch(e){fail('SSE: '+e.message)}

log('');
log('=== localStorage Test ===');
try{localStorage.setItem('_t','1');localStorage.removeItem('_t');ok('localStorage works')}catch(e){fail('localStorage: '+e.message)}

log('');
log('=== Console Errors ===');
var origError = console.error;
console.error = function(){
    log('[console.error] ' + Array.prototype.join.call(arguments,' '), 'fail');
    origError.apply(console, arguments);
};
</script>
</body>
</html>
