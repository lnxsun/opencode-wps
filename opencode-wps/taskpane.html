<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OpenCode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;font-size:14px;color:#1a1a1a;background:#fff}

/* CSS-only icons for WPS Chromium 104 compatibility */
.icon-play{display:inline-block;width:0;height:0;border-style:solid;border-width:7px 0 7px 12px;border-color:transparent transparent transparent #fff;margin-right:6px;vertical-align:middle}
.icon-plus{display:inline-block;width:14px;height:14px;position:relative;vertical-align:middle;flex-shrink:0}
.icon-plus::before{content:'';position:absolute;left:6px;top:1px;width:2px;height:12px;background:#666;border-radius:1px}
.icon-plus::after{content:'';position:absolute;left:1px;top:6px;width:12px;height:2px;background:#666;border-radius:1px}
.icon-stop{display:inline-block;width:10px;height:10px;background:#999;border-radius:2px;vertical-align:middle}
.btn-stop:hover .icon-stop{background:#e53935}
.icon-hamburger{display:inline-flex;flex-direction:column;justify-content:center;gap:3px;width:16px;height:16px}
.icon-hamburger span{display:block;height:2px;background:#666;border-radius:1px}
.icon-send{display:inline-block;width:0;height:0;border-style:solid;border-width:7px 0 7px 12px;border-color:transparent transparent transparent #fff;vertical-align:middle;margin-left:2px}
.icon-model{display:inline-block;width:14px;height:14px;border:2px solid #666;border-radius:7px 7px 3px 3px;position:relative;vertical-align:middle}
.icon-model::after{content:'';position:absolute;top:9px;left:2px;width:6px;height:2px;background:#666;border-radius:1px}
.icon-pen{display:inline-block;width:14px;height:14px;position:relative;vertical-align:middle;flex-shrink:0}
.icon-pen::before{content:'';position:absolute;right:1px;top:1px;width:8px;height:2px;background:#666;transform:rotate(-45deg);transform-origin:right top;border-radius:1px}
.icon-pen::after{content:'';position:absolute;left:3px;bottom:1px;width:2px;height:4px;background:#666;transform:rotate(-45deg);transform-origin:left bottom;border-radius:1px}
.icon-trash{display:inline-block;width:14px;height:14px;position:relative;vertical-align:middle;flex-shrink:0}
.icon-trash::before{content:'';position:absolute;top:2px;left:3px;width:8px;height:10px;border:2px solid #666;border-top:none;border-radius:0 0 2px 2px}
.icon-trash::after{content:'';position:absolute;top:1px;left:2px;width:10px;height:2px;background:#666;border-radius:1px}
.icon-logo{display:inline-block;width:18px;height:18px;border:2px solid #1a1a1a;border-radius:4px;position:relative;flex-shrink:0}
.icon-logo::before{content:'';position:absolute;top:4px;left:3px;width:8px;height:2px;background:#1a1a1a;border-radius:1px}
.icon-logo::after{content:'';position:absolute;top:8px;left:3px;width:6px;height:2px;background:#1a1a1a;border-radius:1px}

/* ===== Layout ===== */
.app{display:flex;flex-direction:column;height:100%}

/* ===== Setup View ===== */
.view-setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px}
.view-setup .setup-icon{width:48px;height:48px;color:#1a1a1a;margin-bottom:4px}
.view-setup h3{font-size:17px;font-weight:600}
.view-setup p{color:#999;font-size:13px;text-align:center;max-width:260px;line-height:1.6}
.setup-cwd-row{width:100%;max-width:300px;display:flex;gap:6px;margin-top:4px}
.setup-cwd-row input{flex:1;border:1px solid #e5e5e5;border-radius:8px;padding:10px 12px;font-size:13px;outline:none;font-family:Consolas,"Microsoft YaHei",monospace;color:#1a1a1a}
.setup-cwd-row input:focus{border-color:#999}
.setup-cwd-row input::placeholder{color:#bbb}
.btn-primary{padding:10px 32px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;background:#1a1a1a;color:#fff;transition:background 0.15s}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:#e0e0e0;color:#999;cursor:default}
.setup-status{font-size:12px;color:#999;min-height:18px}

/* ===== Top bar ===== */
.topbar{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0;background:#fff;gap:8px}
.topbar-logo{display:flex;align-items:center;gap:6px}
.topbar-logo svg{width:18px;height:18px;flex-shrink:0}
.topbar-logo .icon-logo{width:18px;height:18px}
.topbar-logo span{font-weight:700;font-size:14px;letter-spacing:-0.3px}
.topbar-cwd{flex:1;font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:Consolas,monospace}
.topbar-status{display:flex;align-items:center;gap:4px;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.status-dot.running{background:#4caf50}
.status-dot.busy{background:#f5a623;animation:pulse-dot 1.2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
.status-label{font-size:11px;color:#999}
.status-label.running{color:#4caf50}
.btn-stop{width:24px;height:24px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;flex-shrink:0;padding:0}
.btn-stop:hover{background:#fef2f2;border-color:#e53935;color:#e53935}
.btn-stop span{vertical-align:middle}

/* ===== Sub header: hamburger ===== */
.subheader{padding:6px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.hamburger-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#666}
.hamburger-btn:hover{background:#f5f5f5}
.hamburger-btn .icon-hamburger{width:16px;height:16px}

/* ===== Session header ===== */
.session-header{display:flex;align-items:center;padding:10px 12px;flex-shrink:0}
.session-title{flex:1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-status{width:16px;height:16px;display:flex;align-items:center;justify-content:center;margin:0 6px;flex-shrink:0}
.session-status .dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.session-status .dot.busy{background:#f5a623;animation:pulse-dot 1.2s ease-in-out infinite}
.session-status .dot.idle{background:#ccc}
.session-menu{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#999;font-size:16px;letter-spacing:1px}
.session-menu:hover{background:#f5f5f5;color:#333}

/* ===== Messages ===== */
.messages{flex:1;overflow-y:auto;padding:0 12px 12px 12px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

.msg-user{align-self:flex-end;max-width:88%;background:#f2f2f2;color:#1a1a1a;padding:10px 16px;border-radius:18px;border-bottom-right-radius:4px;font-size:14px;line-height:1.6;word-wrap:break-word;overflow-wrap:break-word}
.msg-assistant{align-self:flex-start;max-width:100%;color:#1a1a1a;font-size:14px;line-height:1.7;word-wrap:break-word;overflow-wrap:break-word;padding:0 2px}
.msg-system{align-self:center;font-size:12px;color:#999;padding:4px 12px}

/* Markdown in assistant */
.msg-assistant p{margin:0 0 10px 0}
.msg-assistant p:last-child{margin-bottom:0}
.msg-assistant code{background:#f5f5f5;padding:2px 6px;border-radius:4px;font-family:Consolas,"Courier New",monospace;font-size:13px}
.msg-assistant pre{background:#1e1e1e;color:#d4d4d4;padding:12px 14px;border-radius:8px;overflow-x:auto;margin:10px 0;font-size:12.5px;line-height:1.55}
.msg-assistant pre code{background:none;padding:0;color:inherit}
.msg-assistant strong{font-weight:600}
.msg-assistant em{font-style:italic}
.msg-assistant ul,.msg-assistant ol{margin:6px 0;padding-left:22px}
.msg-assistant li{margin:3px 0}
.msg-assistant h1,.msg-assistant h2,.msg-assistant h3,.msg-assistant h4{margin:14px 0 8px 0;font-weight:600}
.msg-assistant h1{font-size:17px}.msg-assistant h2{font-size:16px}.msg-assistant h3{font-size:15px}
.msg-assistant blockquote{border-left:3px solid #e0e0e0;padding-left:12px;margin:8px 0;color:#666}
.msg-assistant a{color:#2563eb;text-decoration:none}
.msg-assistant a:hover{text-decoration:underline}

/* Thinking */
.thinking-toggle{font-size:12px;color:#aaa;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px;user-select:none}
.thinking-toggle:hover{color:#666}
.thinking-content{font-size:12px;color:#999;margin:4px 0 8px 0;padding:8px 12px;background:#fafafa;border-radius:6px;border-left:2px solid #e0e0e0;display:none;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;line-height:1.5}
.thinking-content.show{display:block}

/* Streaming cursor */
.streaming-cursor::after{content:"";display:inline-block;width:7px;height:15px;background:#1a1a1a;margin-left:2px;vertical-align:text-bottom;animation:cursor-blink 0.8s step-end infinite}
@keyframes cursor-blink{0%,100%{opacity:1}50%{opacity:0}}

/* ===== Input area ===== */
.input-area{padding:10px 12px 6px 12px;flex-shrink:0;background:#fff}
.input-wrapper{border:1px solid #e5e5e5;border-radius:12px;padding:0;overflow:hidden;transition:border-color 0.15s}
.input-wrapper:focus-within{border-color:#ccc}
.input-box{width:100%;border:none;outline:none;padding:10px 14px 4px 14px;font-family:inherit;font-size:14px;line-height:1.5;resize:none;min-height:40px;max-height:120px;color:#1a1a1a;background:transparent}
.input-box::placeholder{color:#bbb}
.input-toolbar{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 6px 8px}
.input-toolbar-left{display:flex;align-items:center;gap:4px}
.plus-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:18px}
.plus-btn:hover{background:#f5f5f5;color:#888}
.send-btn{width:32px;height:32px;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.send-btn.ready{background:#1a1a1a;color:#fff}
.send-btn.ready:hover{background:#333}
.send-btn.disabled{background:#f0f0f0;color:#ccc;cursor:default}
.send-btn span{vertical-align:middle}
.stop-btn{width:32px;height:32px;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0}
.stop-btn:hover{background:#f5f5f5;border-color:#ccc}
.stop-btn .stop-icon{width:12px;height:12px;background:#1a1a1a;border-radius:2px}

/* ===== Bottom bar ===== */
.bottombar{display:flex;align-items:center;padding:4px 12px 8px 12px;gap:4px;flex-shrink:0;border-top:1px solid #f5f5f5;position:relative}
.bb-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:#888;cursor:pointer;padding:4px 8px;border:1px solid transparent;border-radius:6px;background:none;white-space:nowrap;position:relative}
.bb-btn:hover{background:#f5f5f5;border-color:#e8e8e8}
.bb-btn.active{background:#f5f5f5;border-color:#ddd}
.bb-btn .icon-model,.bb-btn svg{width:14px;height:14px;flex-shrink:0}
.bb-btn .chevron{font-size:9px;color:#bbb;margin-left:1px}

/* ===== Dropdown ===== */
.dropdown-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;z-index:50}
.dropdown{position:absolute;background:#fff;border:1px solid #e8e8e8;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,0.12);z-index:51;min-width:160px;padding:6px 0;max-height:400px;overflow-y:auto}
.dropdown.bottom-up{bottom:100%;margin-bottom:6px}
.dropdown.top-down{top:100%;margin-top:6px}
.dd-header{padding:10px 16px 6px 16px;font-size:13px;font-weight:600;color:#1a1a1a}
.dd-divider{height:1px;background:#f0f0f0;margin:6px 0}
.dd-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;font-size:13px;color:#1a1a1a;cursor:pointer;gap:8px}
.dd-item:hover{background:#f5f5f5}
.dd-item.selected{font-weight:500}
.dd-item .dd-check{color:#1a1a1a;font-size:14px;flex-shrink:0}
.dd-item .dd-badge{font-size:10px;padding:1px 6px;border-radius:4px;background:#f0f0f0;color:#888;flex-shrink:0}
.dd-item .dd-badge.free{background:#e8f5e9;color:#2e7d32}
.dd-item-danger{color:#e53935}
.dd-item-danger:hover{background:#fef2f2}

/* Sidebar */
.sidebar-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:60}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:#fff;z-index:61;box-shadow:2px 0 16px rgba(0,0,0,0.1);display:flex;flex-direction:column}
.sidebar-header{padding:16px;font-weight:700;font-size:15px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.sidebar-close{background:none;border:none;font-size:18px;cursor:pointer;color:#999;padding:4px}
.sidebar-close:hover{color:#333}
.sidebar-list{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-item{padding:10px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#333}
.sidebar-item:hover{background:#f5f5f5}
.sidebar-item.active{background:#f0f0f0;font-weight:500}
.sidebar-item .sl-slug{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-item .sl-time{font-size:11px;color:#bbb;flex-shrink:0}

.hidden{display:none!important}
.spinner{width:20px;height:20px;border:2.5px solid #e8e8e8;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <!-- ===== Setup View ===== -->
  <div id="view-setup" class="view-setup">
    <div class="icon-logo"></div>
    <h3>OpenCode</h3>
    <p>Set the working directory and start the server</p>
    <div class="setup-cwd-row">
      <input id="setup-cwd" type="text" placeholder="D:\code\my-project" spellcheck="false">
    </div>
    <button class="btn-primary" id="btn-start" onclick="startOpenCode()"><span class="icon-play"></span>Start Server</button>
    <div class="setup-status" id="setup-status"></div>
  </div>

  <!-- ===== Chat View ===== -->
  <div id="view-chat" class="hidden" style="display:flex;flex-direction:column;height:100%">
    <div class="topbar">
      <div class="topbar-logo">
        <div class="icon-logo"></div>
        <span>OpenCode</span>
      </div>
      <div class="topbar-cwd" id="topbar-cwd" title="Working directory"></div>
      <div class="topbar-actions" style="display:flex;gap:4px;align-items:center">
        <button class="topbar-btn" title="New Session" onclick="newSession()" style="width:24px;height:24px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0"><span class="icon-plus"></span></button>
        <div class="topbar-status">
          <div class="status-dot running" id="server-dot"></div>
          <span class="status-label running" id="server-label">Running</span>
          <button class="btn-stop" title="Stop server" onclick="stopOpenCode()"><span class="icon-stop"></span></button>
        </div>
      </div>
    </div>
    <div class="subheader">
      <button class="hamburger-btn" title="Menu" onclick="openSidebar()">
        <div class="icon-hamburger"><span></span><span></span><span></span></div>
      </button>
    </div>
    <div class="session-header" id="session-header-area">
      <span class="session-title" id="session-title">WPS Office</span>
      <div class="session-status"><div class="dot idle" id="status-dot"></div></div>
      <button class="session-menu" title="More" onclick="toggleSessionMenu(event)">...</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="input-box" id="input-box" placeholder="Ask anything..." rows="1" onkeydown="onInputKey(event)" oninput="autoGrow(this)"></textarea>
        <div class="input-toolbar">
          <div class="input-toolbar-left">
            <button class="plus-btn" title="Insert document context into chat" onclick="forceInjectContext()">+</button>
          </div>
          <div id="send-area">
            <button class="send-btn disabled" id="send-btn" onclick="sendMessage()" title="Send">
              <span class="icon-send"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="bottombar" id="bottombar">
      <button class="bb-btn" id="bb-mode" onclick="toggleModeDropdown(event)">
        <span id="mode-label">Build</span><span class="chevron">&#9662;</span>
      </button>
      <button class="bb-btn" id="bb-model" onclick="toggleModelDropdown(event)">
        <span class="icon-model"></span>
        <span id="model-name">AI Model</span><span class="chevron">&#9662;</span>
      </button>
    </div>
  </div>
</div>

<script>
// ============================================================
// OpenCode Chat - Custom UI for WPS sidebar (Chrome 104 compatible)
// Flow: Setup (choose CWD + start) → Chat (with status bar)
// ============================================================

var API_BASE = 'http://127.0.0.1:14096'
var SESSION_ID = ''
var PROJECT_DIR = ''
var IS_BUSY = false
var SSE = null
var PART_TYPES = {}
var STREAMING_MSG_ID = ''
var STREAMING_TEXT = ''
var STREAMING_REASONING = ''
var STREAMING_TEXT_PART_ID = ''
var STREAMING_REASONING_PART_ID = ''
var CONNECTED = false
var LAST_INJECTED_CONTEXT = ''
var CURRENT_MODEL = ''
var CURRENT_MODE = 'build'
var AVAILABLE_MODELS = []
var SERVER_RUNNING = false
var HEALTH_CHECK_TIMER = null

var $messages = document.getElementById('messages')
var $input = document.getElementById('input-box')
var $sendBtn = document.getElementById('send-btn')
var $sendArea = document.getElementById('send-area')
var $sessionTitle = document.getElementById('session-title')
var $statusDot = document.getElementById('status-dot')
var $modelName = document.getElementById('model-name')
var $viewSetup = document.getElementById('view-setup')
var $viewChat = document.getElementById('view-chat')
var $setupCwd = document.getElementById('setup-cwd')
var $btnStart = document.getElementById('btn-start')
var $setupStatus = document.getElementById('setup-status')
var $topbarCwd = document.getElementById('topbar-cwd')
var $serverDot = document.getElementById('server-dot')
var $serverLabel = document.getElementById('server-label')

// --- Storage ---
function getPS(key) { try { return window.Application.PluginStorage.getItem(key) || '' } catch(e) { return '' } }
function setPS(key, val) { try { window.Application.PluginStorage.setItem(key, val) } catch(e) {} }

// --- View switching ---
function showSetup() {
    $viewSetup.classList.remove('hidden')
    $viewChat.classList.add('hidden')
    stopHealthCheck()
    // 恢复上次 CWD
    var lastCwd = getPS('opencode_cwd')
    if (lastCwd) $setupCwd.value = lastCwd
    $setupStatus.textContent = ''
    $btnStart.disabled = false
    $btnStart.textContent = 'Start Server'
}

function showChat() {
    $viewSetup.classList.add('hidden')
    $viewChat.classList.remove('hidden')
}

// --- Server start / stop ---
function startOpenCode() {
    var cwd = $setupCwd.value.replace(/\\/g, '\\\\').trim()
    if (!cwd) { $setupStatus.textContent = 'Please enter a working directory'; return }
    // 保存 CWD 到 PluginStorage
    setPS('opencode_cwd', cwd)
    PROJECT_DIR = cwd
    $topbarCwd.textContent = cwd.replace(/\\\\/g, '\\')
    $topbarCwd.title = cwd.replace(/\\\\/g, '\\')

    // 通过 main.js 命令通道启动 VBS
    $btnStart.disabled = true
    $btnStart.innerHTML = '<span class="spinner"></span> Starting...'
    $setupStatus.textContent = 'Starting OpenCode server...'

    // 发送启动命令给 main.js
    setPS('opencode_command', 'start:' + cwd.replace(/\\\\/g, '\\'))

    // 先检查 launcher 是否可用
    var launcherUrl = 'http://127.0.0.1:14097'
    var launcherOk = false
    var xhrLauncher = new XMLHttpRequest()
    xhrLauncher.timeout = 3000
    xhrLauncher.open('GET', launcherUrl + '/status', true)
    xhrLauncher.onreadystatechange = function() {
        if (xhrLauncher.readyState === 4 && xhrLauncher.status === 200) {
            launcherOk = true
        }
    }
    xhrLauncher.onerror = function() {}
    xhrLauncher.ontimeout = function() {}
    try { xhrLauncher.send() } catch(e) {}

    // 轮询等待服务就绪
    var retries = 0
    var maxRetries = 30
    var pollTimer = setInterval(function() {
        fetchJSON('GET', '/global/health', null, function(data) {
            if (data && data.healthy) {
                clearInterval(pollTimer)
                onServerConnected()
            }
        }, function() {
            retries++
            if (retries >= maxRetries) {
                clearInterval(pollTimer)
                $btnStart.disabled = false
                $btnStart.textContent = 'Start Server'
                if (!launcherOk) {
                    $setupStatus.textContent = 'Launcher not running. Run: node launcher.js (in opencode-wps directory)'
                } else {
                    $setupStatus.textContent = 'Failed to start opencode. Check if opencode is installed.'
                }
            }
        })
    }, 1000)
}

function stopOpenCode() {
    // 通过 main.js 命令通道停止
    setPS('opencode_command', 'stop')
    SERVER_RUNNING = false
    CONNECTED = false
    if (SSE) { SSE.close(); SSE = null }
    updateServerStatus(false)
    showSetup()
}

function onServerConnected() {
    SERVER_RUNNING = true
    CONNECTED = true
    updateServerStatus(true)
    showChat()
    fetchAvailableModels(function() { $modelName.textContent = CURRENT_MODEL || 'AI Model' })
    var sid = getPS('opencode_session_id')

// --- Status ---
function setStatus(s) { IS_BUSY = (s === 'busy'); $statusDot.className = 'dot ' + (IS_BUSY ? 'busy' : 'idle'); updateInputState() }

// --- Fetch ---
function fetchJSON(method, path, body, onSuccess, onError, timeout) {
    var xhr = new XMLHttpRequest(); xhr.timeout = timeout || 15000
    xhr.onreadystatechange = function() { if (xhr.readyState === 4) { if (xhr.status >= 200 && xhr.status < 300) { try { onSuccess(JSON.parse(xhr.responseText)) } catch(e) { onSuccess(null) } } else if (xhr.status > 0 && onError) { onError(xhr.status, xhr.responseText) } } }
    xhr.onerror = function() { if (onError) onError(0, 'Network error') }
    xhr.ontimeout = function() { if (onError) onError(0, 'Timeout') }
    xhr.open(method, API_BASE + path, true); xhr.setRequestHeader('Content-Type', 'application/json')
    if (body) xhr.send(JSON.stringify(body)); else xhr.send()
}
function postMessage(path, body, onError) {
    var xhr = new XMLHttpRequest(); xhr.timeout = 300000
    xhr.onreadystatechange = function() { if (xhr.readyState === 4 && xhr.status >= 400 && onError) onError(xhr.status, xhr.responseText) }
    xhr.onerror = function() { if (onError) onError(0, 'Network error') }
    xhr.ontimeout = function() { console.log('[Chat] POST timeout (SSE still active)') }
    xhr.open('POST', API_BASE + path, true); xhr.setRequestHeader('Content-Type', 'application/json'); xhr.send(JSON.stringify(body))
}

// --- Session ---
function createNewSession(cb) {
    fetchJSON('POST', '/session', { title: 'WPS Office' }, function(resp) {
        var data = resp && resp.data ? resp.data : resp
        if (data && data.id) { SESSION_ID = data.id; setPS('opencode_session_id', SESSION_ID); $sessionTitle.textContent = data.title || data.slug || 'WPS Office'; $messages.innerHTML = ''; LAST_INJECTED_CONTEXT = ''; if (cb) cb() }
    }, function(s, t) { addSystemMessage('Session Error: ' + (t || s)) })
}
function newSession() { if (IS_BUSY) return; createNewSession(function() { if (!SSE) connectSSE() }) }
function loadSessionMessages(sid) {
    fetchJSON('GET', '/session/' + sid + '/message', null, function(msgs) {
        $messages.innerHTML = ''; if (!msgs) return
        var list = msgs.data ? msgs.data : (Array.isArray(msgs) ? msgs : [msgs])
        for (var i = 0; i < list.length; i++) renderHistoryMessage(list[i])
        scrollToBottom()
    })
    fetchJSON('GET', '/session/' + sid, null, function(sess) { var d = sess && sess.data ? sess.data : sess; if (d) $sessionTitle.textContent = d.title || d.slug || 'WPS Office' })
}
function renderHistoryMessage(msg) {
    if (!msg || !msg.info) return
    var parts = msg.parts || []
    if (msg.info.role === 'user') {
        var texts = []
        for (var i = 0; i < parts.length; i++) { if (parts[i].type === 'text' && !parts[i].ignored && !(parts[i].text && parts[i].text.indexOf('<wps-context>') === 0)) texts.push(parts[i].text) }
        if (texts.length > 0) addUserMessage(texts.join('\n'))
    } else if (msg.info.role === 'assistant') {
        var reasoning = '', text = ''
        for (var i = 0; i < parts.length; i++) { if (parts[i].type === 'reasoning' && parts[i].text) reasoning += parts[i].text; if (parts[i].type === 'text' && parts[i].text) text += parts[i].text }
        if (text || reasoning) addAssistantMessage(text, reasoning)
        if (msg.info.modelID && !CURRENT_MODEL) { CURRENT_MODEL = msg.info.modelID; $modelName.textContent = CURRENT_MODEL }
    }
}

// --- SSE ---
function connectSSE() {
    if (SSE) { SSE.close(); SSE = null }
    try {
        SSE = new EventSource(API_BASE + '/global/event')
        SSE.onmessage = function(ev) { try { handleSSEEvent(JSON.parse(ev.data)) } catch(e) {} }
        SSE.onerror = function() { setTimeout(function() { if (CONNECTED) connectSSE() }, 3000) }
    } catch(e) {}
}
function handleSSEEvent(data) {
    if (!data || !data.payload) return
    var type = data.payload.type, props = data.payload.properties || {}
    if (props.sessionID && props.sessionID !== SESSION_ID) return
    switch(type) {
        case 'session.status':
            if (props.status) { setStatus(props.status.type === 'busy' ? 'busy' : 'idle'); if (props.status.type === 'idle') finalizeStreaming() }
            break
        case 'message.updated':
            if (props.info && props.info.role === 'assistant' && !props.info.finish) {
                STREAMING_MSG_ID = props.info.id; STREAMING_TEXT = ''; STREAMING_REASONING = ''; STREAMING_TEXT_PART_ID = ''; STREAMING_REASONING_PART_ID = ''
                ensureStreamingBubble()
                if (props.info.modelID) { CURRENT_MODEL = props.info.modelID; $modelName.textContent = CURRENT_MODEL }
            }
            if (props.info && props.info.role === 'assistant' && props.info.finish) finalizeStreaming()
            break
        case 'message.part.updated':
            if (props.part) {
                PART_TYPES[props.part.id] = { type: props.part.type, messageID: props.part.messageID }
                if (props.part.type === 'text' && props.part.messageID === STREAMING_MSG_ID) { STREAMING_TEXT_PART_ID = props.part.id; if (props.part.text && props.part.time && props.part.time.end) { STREAMING_TEXT = props.part.text; updateStreamingBubble() } }
                if (props.part.type === 'reasoning' && props.part.messageID === STREAMING_MSG_ID) { STREAMING_REASONING_PART_ID = props.part.id; if (props.part.text && props.part.time && props.part.time.end) { STREAMING_REASONING = props.part.text; updateStreamingBubble() } }
            }
            break
        case 'message.part.delta':
            if (props.field === 'text' && props.delta) {
                var pi = PART_TYPES[props.partID]
                if (pi) { if (pi.type === 'text') STREAMING_TEXT += props.delta; else if (pi.type === 'reasoning') STREAMING_REASONING += props.delta }
                else if (props.partID === STREAMING_TEXT_PART_ID) STREAMING_TEXT += props.delta
                else if (props.partID === STREAMING_REASONING_PART_ID) STREAMING_REASONING += props.delta
                else STREAMING_TEXT += props.delta
                updateStreamingBubble()
            }
            break
    }
}

// --- Streaming UI ---
function ensureStreamingBubble() { var el = document.getElementById('streaming-msg'); if (!el) { el = document.createElement('div'); el.id = 'streaming-msg'; el.className = 'msg-assistant'; el.innerHTML = '<span class="streaming-cursor"></span>'; $messages.appendChild(el); scrollToBottom() } }
function updateStreamingBubble() {
    var el = document.getElementById('streaming-msg'); if (!el) { ensureStreamingBubble(); el = document.getElementById('streaming-msg') }
    var html = ''
    if (STREAMING_REASONING) { html += '<div class="thinking-toggle" onclick="toggleThinking(this)">&#9654; Thinking (' + STREAMING_REASONING.length + ' chars)</div><div class="thinking-content">' + escapeHtml(STREAMING_REASONING) + '</div>' }
    if (STREAMING_TEXT) { html += renderMarkdown(STREAMING_TEXT) + '<span class="streaming-cursor"></span>' } else if (!STREAMING_REASONING) { html += '<span class="streaming-cursor"></span>' }
    el.innerHTML = html; scrollToBottom()
}
function finalizeStreaming() {
    var el = document.getElementById('streaming-msg')
    if (el && (STREAMING_TEXT || STREAMING_REASONING)) {
        var html = ''
        if (STREAMING_REASONING) html += '<div class="thinking-toggle" onclick="toggleThinking(this)">&#9654; Thinking (' + STREAMING_REASONING.length + ' chars)</div><div class="thinking-content">' + escapeHtml(STREAMING_REASONING) + '</div>'
        if (STREAMING_TEXT) html += renderMarkdown(STREAMING_TEXT)
        el.innerHTML = html; el.removeAttribute('id')
    } else if (el) el.removeAttribute('id')
    STREAMING_MSG_ID = ''; STREAMING_TEXT = ''; STREAMING_REASONING = ''; STREAMING_TEXT_PART_ID = ''; STREAMING_REASONING_PART_ID = ''
    setStatus('idle'); scrollToBottom()
}
function toggleThinking(el) { var c = el.nextElementSibling; if (c) { c.classList.toggle('show'); el.innerHTML = (c.classList.contains('show') ? '&#9660;' : '&#9654;') + ' Thinking (' + c.textContent.length + ' chars)' } }

// --- Messages ---
function addUserMessage(text) { var el = document.createElement('div'); el.className = 'msg-user'; el.textContent = text; $messages.appendChild(el); scrollToBottom() }
function addAssistantMessage(text, reasoning) {
    var el = document.createElement('div'); el.className = 'msg-assistant'; var html = ''
    if (reasoning) html += '<div class="thinking-toggle" onclick="toggleThinking(this)">&#9654; Thinking (' + reasoning.length + ' chars)</div><div class="thinking-content">' + escapeHtml(reasoning) + '</div>'
    html += renderMarkdown(text || ''); el.innerHTML = html; $messages.appendChild(el); scrollToBottom()
}
function addSystemMessage(text) { var el = document.createElement('div'); el.className = 'msg-system'; el.textContent = text; $messages.appendChild(el); scrollToBottom() }

// --- Send ---
function sendMessage() {
    var text = $input.value.trim(); if (!text || IS_BUSY || !SESSION_ID) return
    addUserMessage(text); $input.value = ''; autoGrow($input); setStatus('busy')
    injectContext(function() {
        postMessage('/session/' + SESSION_ID + '/message', { parts: [{ type: 'text', text: text }] }, function(s, t) { addSystemMessage('Error: ' + (t || 'status ' + s)); finalizeStreaming() })
    })
}
function injectContext(cb) {
    var ctx = gatherWpsContext(); if (!ctx || ctx === LAST_INJECTED_CONTEXT) { cb(); return }
    LAST_INJECTED_CONTEXT = ctx
    var xhr = new XMLHttpRequest(); xhr.timeout = 10000
    xhr.onreadystatechange = function() { if (xhr.readyState === 4) cb() }
    xhr.onerror = function() { cb() }; xhr.ontimeout = function() { cb() }
    xhr.open('POST', API_BASE + '/session/' + SESSION_ID + '/message', true)
    xhr.setRequestHeader('Content-Type', 'application/json')
    xhr.send(JSON.stringify({ noReply: true, parts: [{ type: 'text', text: ctx }] }))
}
function forceInjectContext() {
    if (!SESSION_ID || IS_BUSY) return; LAST_INJECTED_CONTEXT = ''
    var ctx = gatherWpsContext(); if (!ctx) { addSystemMessage('No document context available'); return }
    LAST_INJECTED_CONTEXT = ctx; addSystemMessage('Document context injected')
    var xhr = new XMLHttpRequest(); xhr.timeout = 10000
    xhr.open('POST', API_BASE + '/session/' + SESSION_ID + '/message', true)
    xhr.setRequestHeader('Content-Type', 'application/json')
    xhr.send(JSON.stringify({ noReply: true, parts: [{ type: 'text', text: ctx }] }))
}
function gatherWpsContext() {
    var lines = []
    try { var doc = window.Application.ActiveDocument; if (doc) { if (doc.Name) lines.push('Current document: ' + doc.Name); if (doc.Path) lines.push('Path: ' + doc.Path) } } catch(e) {}
    try { var sel = window.Application.Selection; if (sel && sel.Text && sel.Text.trim()) { var t = sel.Text; if (t.length > 3000) t = t.substring(0, 3000) + '...[truncated]'; lines.push(''); lines.push('Selected text:'); lines.push('"""'); lines.push(t); lines.push('"""') } } catch(e) {}
    if (lines.length === 0) return null
    return '<wps-context>\n' + lines.join('\n') + '\n</wps-context>'
}
function abortMessage() { if (!SESSION_ID) return; fetchJSON('POST', '/session/' + SESSION_ID + '/abort', null, function() { addSystemMessage('Aborted'); finalizeStreaming() }) }

// --- Input ---
function onInputKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }; setTimeout(updateSendButton, 0) }
function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; updateSendButton() }
function updateSendButton() { $sendBtn.className = 'send-btn ' + ($input.value.trim().length > 0 && !IS_BUSY ? 'ready' : 'disabled') }

// --- Markdown ---
function renderMarkdown(text) {
    if (!text) return ''
    var codeBlocks = []
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
        codeBlocks.push('<pre><code>' + escapeHtml(code) + '</code></pre>')
        return '\x00CB' + (codeBlocks.length - 1) + '\x00'
    })
    var inlineCodes = []
    text = text.replace(/`([^`\n]+)`/g, function(m, code) {
        inlineCodes.push('<code>' + escapeHtml(code) + '</code>')
        return '\x00IC' + (inlineCodes.length - 1) + '\x00'
    })
    text = escapeHtml(text)
    text = text.replace(/\x00CB(\d+)\x00/g, function(m, i) { return codeBlocks[i] })
    text = text.replace(/\x00IC(\d+)\x00/g, function(m, i) { return inlineCodes[i] })
    var lines = text.split('\n')
    var out = '', inList = false, listType = '', inPara = false, inTable = false
    function closeList() { if (inList) { out += '</' + listType + '>'; inList = false; listType = '' } }
    function closePara() { if (inPara) { out += '</p>'; inPara = false } }
    function closeTable() { if (inTable) { out += '</tbody></table>'; inTable = false } }
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i]
        if (line.indexOf('<pre>') === 0 || line.indexOf('</pre>') !== -1) { closeList(); closePara(); closeTable(); out += line; continue }
        if (/^\s*$/.test(line)) { closeList(); closePara(); closeTable(); continue }
        var hm = line.match(/^(#{1,4})\s+(.+)$/)
        if (hm) { closeList(); closePara(); closeTable(); var lv = hm[1].length; out += '<h' + lv + '>' + inlineFmt(hm[2]) + '</h' + lv + '>'; continue }
        if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) { closeList(); closePara(); closeTable(); out += '<hr>'; continue }
        if (/^&gt;\s?/.test(line)) { closeList(); closePara(); closeTable(); out += '<blockquote>' + inlineFmt(line.replace(/^&gt;\s?/, '')) + '</blockquote>'; continue }
        var ulm = line.match(/^[-*]\s+(.+)$/)
        if (ulm) { closePara(); closeTable(); if (!inList || listType !== 'ul') { closeList(); out += '<ul>'; inList = true; listType = 'ul' } out += '<li>' + inlineFmt(ulm[1]) + '</li>'; continue }
        var olm = line.match(/^\d+\.\s+(.+)$/)
        if (olm) { closePara(); closeTable(); if (!inList || listType !== 'ol') { closeList(); out += '<ol>'; inList = true; listType = 'ol' } out += '<li>' + inlineFmt(olm[1]) + '</li>'; continue }
        if (/^\|(.+)\|$/.test(line) && line.split('|').length > 3) {
            closeList(); closePara()
            if (/^\|[\s\-:|]+\|$/.test(line)) continue
            if (!inTable) { out += '<table style="border-collapse:collapse;margin:8px 0"><tbody>'; inTable = true }
            var cells = line.replace(/^\||\|$/g, '').split('|')
            out += '<tr>' + cells.map(function(c) { return '<td style="border:1px solid #ddd;padding:4px 8px">' + inlineFmt(c.trim()) + '</td>' }).join('') + '</tr>'
            continue
        }
        closeList(); closeTable()
        if (inPara) { out += ' ' + inlineFmt(line) } else { out += '<p>' + inlineFmt(line); inPara = true }
    }
    closeList(); closePara(); closeTable()
    return out
}
function safeHref(url) { var u = (url || '').replace(/^\s+|\s+$/g, '').toLowerCase(); if (u.indexOf('javascript:') === 0 || u.indexOf('data:') === 0) return '#'; return url }
function inlineFmt(s) {
    if (!s) return ''
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>')
    s = s.replace(/~~(.+?)~~/g, '<del>$1</del>')
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(m, alt, url) { return '<img src="' + safeHref(url) + '" alt="' + escapeHtml(alt) + '" style="max-width:100%">' })
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(m, text, url) { return '<a href="' + safeHref(url) + '" target="_blank">' + text + '</a>' })
    return s
}
function scrollToBottom() { setTimeout(function() { $messages.scrollTop = $messages.scrollHeight }, 50) }

// ============================================================
// 启动流程：检查服务是否已在运行 → 是则直接进 chat；否则显示 setup
// ============================================================
(function init() {
    var lastCwd = getPS('opencode_cwd')
    if (lastCwd) $setupCwd.value = lastCwd.replace(/\\\\/g, '\\')

    // 先检查 opencode 是否已在运行
    fetchJSON('GET', '/global/health', null, function(data) {
        if (data && data.healthy) {
            // 服务已运行，直接进 chat
            PROJECT_DIR = lastCwd || ''
            $topbarCwd.textContent = PROJECT_DIR.replace(/\\\\/g, '\\')
            $topbarCwd.title = PROJECT_DIR.replace(/\\\\/g, '\\')
            onServerConnected()
        } else {
            // 服务未运行，显示 setup
            showSetup()
        }
    }, function() {
        // 连接失败，显示 setup
        showSetup()
    })
})()
</script>
