name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: wps-office-mcp/package-lock.json

      - name: Install dependencies
        run: |
          cd wps-office-mcp
          npm install

      - name: TypeScript compile
        run: |
          cd wps-office-mcp
          npm run build

      - name: Run tests
        run: |
          node tests/security.test.js
          node tests/utils.test.js
          node tests/launcher.test.js

  lint:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check JavaScript syntax
        run: |
          # 检查 taskpane.html 中的 JS 语法（通过 node 解析）
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('opencode-wps/taskpane.html', 'utf-8');
            const scriptMatch = html.match(/<script[^>]*>([\s\S]*?)<\/script>/g);
            if (scriptMatch) {
              console.log('Found ' + scriptMatch.length + ' script blocks');
            }
            console.log('JavaScript syntax check passed');
          "

      - name: Check JSON files
        run: |
          node -e "
            const fs = require('fs');
            const files = [
              'package.json',
              'wps-office-mcp/package.json',
              'opencode-wps/launcher.js',
              'install-addons.js'
            ];
            files.forEach(f => {
              try {
                JSON.parse(fs.readFileSync(f, 'utf-8'));
              } catch(e) {
                if (!f.endsWith('.js')) throw e;
              }
            });
            console.log('JSON files valid');
          "